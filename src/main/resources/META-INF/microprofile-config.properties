# ---------------------------------------------------------------------------
# GitHub API configuration
# Override these via environment variables:
#   GITHUB_PAT   – fine-grained PAT with "Administration" org permission (read)
#   GITHUB_ORG   – target organization name
# ---------------------------------------------------------------------------
github.pat=${GITHUB_PAT}
github.org=${GITHUB_ORG}

# MicroProfile REST Client base URL for GitHub API
github-billing/mp-rest/url=https://api.github.com

# Optional: connection/read timeouts in milliseconds (default 10 s each)
github-billing/mp-rest/connectTimeout=10000
github-billing/mp-rest/readTimeout=30000
