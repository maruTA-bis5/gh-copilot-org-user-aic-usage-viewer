name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn verify --batch-mode

      - name: Upload bootable JAR
        uses: actions/upload-artifact@v4
        with:
          name: bootable-jar
          path: target/gh-copilot-org-user-aic-usage-viewer-bootable.jar
          retention-days: 7
